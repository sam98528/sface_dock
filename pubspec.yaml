name: sfacedock
description: "SFace Photo Kiosk Application"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Routing
  auto_route: ^11.1.0

  # HTTP client
  dio: ^5.4.0
  http: ^1.2.0
  flutter_dotenv: ^6.0.0

  # FFI for native IPC communication
  ffi: ^2.1.0
  flutter_libserialport: ^0.6.0

  # JSON handling
  json_annotation: ^4.8.1
  freezed_annotation: ^3.1.0

  # Utilities
  equatable: ^2.0.5
  uuid: ^4.3.3
  logger: ^2.0.2+1
  package_info_plus: ^9.0.0
  intl: ^0.20.2

  # UI components
  google_fonts: ^8.0.2
  path_provider: ^2.1.2
  path: ^1.9.0
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  flutter_staggered_grid_view: ^0.7.0
  carousel_slider: ^5.0.0

  # Image handling
  image: ^4.1.3
  cached_network_image: ^3.3.1

  # QR code
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0

  # Printing
  printing: ^5.13.4
  pdf: ^3.11.0

  # Audio
  audioplayers: ^6.0.0

  # Storage
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.2.2

  # Window management
  window_manager: ^0.5.1

  # Character encoding (CP949/EUC-KR support)
  charset: ^2.0.1
  flutter_cache_manager: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  freezed: ^3.2.5
  auto_route_generator: ^10.5.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    # - assets/vector/
    - assets/sounds/effects/
    - assets/sounds/background/
    - assets/fonts/

  fonts:
    - family: LINESeed
      fonts:
        - asset: assets/fonts/lineseed/LINESeedKR-Th.otf
          weight: 100
        - asset: assets/fonts/lineseed/LINESeedKR-Rg.otf
          weight: 400
        - asset: assets/fonts/lineseed/LINESeedKR-Bd.otf
          weight: 700
    - family: Pretendard
      fonts:
        - asset: assets/fonts/pretendard/Pretendard-Regular.otf
          weight: 400
        - asset: assets/fonts/pretendard/Pretendard-Medium.otf
          weight: 500
        - asset: assets/fonts/pretendard/Pretendard-SemiBold.otf
          weight: 600
